name: player_android
description: A modern self-hosted Navidrome music streaming client.
publish_to: none
version: 0.1.0+1
environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_riverpod: ^2.5.0
  go_router: ^7.0.0
  dio: ^5.9.2
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  cached_network_image: ^3.2.3
  flutter_secure_storage: ^8.0.0
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
