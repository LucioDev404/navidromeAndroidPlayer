name: Flutter Release

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-build:
    name: Build signed release APK and AAB
    runs-on: ubuntu-latest

    env:
      FLUTTER_CHANNEL: stable
      KEYSTORE_FILE: android/app/upload-keystore.jks
      KEY_PROPERTIES_FILE: android/key.properties
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure Android project exists
        run: |
          if [ ! -d android ]; then
            flutter create . --platforms=android
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $KEYSTORE_FILE

      - name: Create key.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > $KEY_PROPERTIES_FILE <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: flutter build apk --release

      - name: Build release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: flutter build appbundle --release

      - name: Skip release build because signing secrets are missing
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: echo "Release build skipped. Provide KEYSTORE_BASE64 and other signing secrets to generate signed APK/AAB."

      - name: Upload release APK artifact
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload release AAB artifact
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - id: create_release
        name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && secrets.KEYSTORE_BASE64 != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated Flutter release for ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && secrets.KEYSTORE_BASE64 != ''
        uses: softprops/upload-release-asset@v2
        with:
          release_id: ${{ steps.create_release.outputs.id }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload AAB to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && secrets.KEYSTORE_BASE64 != ''
        uses: softprops/upload-release-asset@v2
        with:
          release_id: ${{ steps.create_release.outputs.id }}
          asset_path: build/app/outputs/bundle/release/app-release.aab
          asset_name: app-release.aab
          asset_content_type: application/octet-stream
